# =============================================================================
# Sub2API Docker Swarm Configuration（零停机滚动升级版）
# =============================================================================
# 用法：
#   1. 初始化 swarm（仅一次）:
#        docker swarm init
#
#   2. 部署（替代 docker compose up -d）:
#        cd deploy/
#        docker stack deploy -c docker-compose.swarm.yml sub2api
#
#   3. 查看状态:
#        docker stack services sub2api
#        docker stack ps sub2api
#
#   4. 升级镜像（零停机滚动）:
#        docker pull weishaw/sub2api:latest
#        docker service update --image weishaw/sub2api:latest --force sub2api_sub2api
#
#   5. 紧急回滚:
#        docker service rollback sub2api_sub2api
#
#   6. 查日志:
#        docker service logs -f sub2api_sub2api
#
#   7. 停掉整个 stack:
#        docker stack rm sub2api
#
# 详细说明见 deploy/SWARM_DEPLOY.md
#
# ⚠️ 前置条件：
#   - .env 必须固定 JWT_SECRET 和 TOTP_ENCRYPTION_KEY
#     （否则两个 task token 互不认）
# =============================================================================

services:
  # ===========================================================================
  # Sub2API Application（2 副本，滚动升级，graceful shutdown 5 分钟）
  # ===========================================================================
  sub2api:
    image: weishaw/sub2api:latest
    # ⚠️ Swarm 模式不支持 container_name（会被忽略并报 warning）
    # 容器名自动变为 sub2api_sub2api.1.xxxx / sub2api_sub2api.2.xxxx
    
    # ★ 关键：给应用 5 分钟 graceful shutdown 时间
    # 应用收到 SIGTERM 后停止接受新连接（不再 ListenAndServe），
    # 但保留正在跑的长流（SSE/图片生成）直到全部结束。
    # 5 分钟到期后 Swarm 发 SIGKILL 强制终止剩余 in-flight 请求。
    stop_grace_period: 300s
    
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    ports:
      - "${BIND_HOST:-0.0.0.0}:${SERVER_PORT:-8080}:8080"
    volumes:
      - sub2api_data:/app/data
    environment:
      # =======================================================================
      # 以下为业务配置（与原 docker-compose.yml 一致）
      # =======================================================================
      - AUTO_SETUP=true
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - SERVER_MODE=${SERVER_MODE:-release}
      - RUN_MODE=${RUN_MODE:-standard}
      
      # 数据库
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${POSTGRES_USER:-sub2api}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - DATABASE_DBNAME=${POSTGRES_DB:-sub2api}
      - DATABASE_SSLMODE=disable
      - DATABASE_MAX_OPEN_CONNS=${DATABASE_MAX_OPEN_CONNS:-50}
      - DATABASE_MAX_IDLE_CONNS=${DATABASE_MAX_IDLE_CONNS:-10}
      - DATABASE_CONN_MAX_LIFETIME_MINUTES=${DATABASE_CONN_MAX_LIFETIME_MINUTES:-30}
      - DATABASE_CONN_MAX_IDLE_TIME_MINUTES=${DATABASE_CONN_MAX_IDLE_TIME_MINUTES:-5}
      
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_POOL_SIZE=${REDIS_POOL_SIZE:-1024}
      - REDIS_MIN_IDLE_CONNS=${REDIS_MIN_IDLE_CONNS:-10}
      - REDIS_ENABLE_TLS=${REDIS_ENABLE_TLS:-false}
      
      # Admin 账号
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@sub2api.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      
      # ⚠️ Swarm 多副本场景必须固定，否则两个 task 的 token 互不认
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required for swarm multi-replica}
      - JWT_EXPIRE_HOUR=${JWT_EXPIRE_HOUR:-24}
      - TOTP_ENCRYPTION_KEY=${TOTP_ENCRYPTION_KEY:?TOTP_ENCRYPTION_KEY is required for swarm multi-replica}
      
      - TZ=${TZ:-Asia/Shanghai}
      
      # OAuth
      - GEMINI_OAUTH_CLIENT_ID=${GEMINI_OAUTH_CLIENT_ID:-}
      - GEMINI_OAUTH_CLIENT_SECRET=${GEMINI_OAUTH_CLIENT_SECRET:-}
      - GEMINI_OAUTH_SCOPES=${GEMINI_OAUTH_SCOPES:-}
      - GEMINI_QUOTA_POLICY=${GEMINI_QUOTA_POLICY:-}
      - GEMINI_CLI_OAUTH_CLIENT_SECRET=${GEMINI_CLI_OAUTH_CLIENT_SECRET:-}
      - ANTIGRAVITY_OAUTH_CLIENT_SECRET=${ANTIGRAVITY_OAUTH_CLIENT_SECRET:-}
      
      # Security
      - SECURITY_URL_ALLOWLIST_ENABLED=${SECURITY_URL_ALLOWLIST_ENABLED:-false}
      - SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP=${SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP:-false}
      - SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS=${SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS:-false}
      - SECURITY_URL_ALLOWLIST_UPSTREAM_HOSTS=${SECURITY_URL_ALLOWLIST_UPSTREAM_HOSTS:-}
      
      # Update
      - UPDATE_PROXY_URL=${UPDATE_PROXY_URL:-}
      
      # Image gen
      - GATEWAY_IMAGE_STREAM_DATA_INTERVAL_TIMEOUT=${GATEWAY_IMAGE_STREAM_DATA_INTERVAL_TIMEOUT:-900}
      - GATEWAY_IMAGE_STREAM_KEEPALIVE_INTERVAL=${GATEWAY_IMAGE_STREAM_KEEPALIVE_INTERVAL:-10}
      - GATEWAY_IMAGE_CONCURRENCY_ENABLED=${GATEWAY_IMAGE_CONCURRENCY_ENABLED:-false}
      - GATEWAY_IMAGE_CONCURRENCY_MAX_CONCURRENT_REQUESTS=${GATEWAY_IMAGE_CONCURRENCY_MAX_CONCURRENT_REQUESTS:-0}
      - GATEWAY_IMAGE_CONCURRENCY_OVERFLOW_MODE=${GATEWAY_IMAGE_CONCURRENCY_OVERFLOW_MODE:-reject}
      - GATEWAY_IMAGE_CONCURRENCY_WAIT_TIMEOUT_SECONDS=${GATEWAY_IMAGE_CONCURRENCY_WAIT_TIMEOUT_SECONDS:-30}
      - GATEWAY_IMAGE_CONCURRENCY_MAX_WAITING_REQUESTS=${GATEWAY_IMAGE_CONCURRENCY_MAX_WAITING_REQUESTS:-100}
    
    networks:
      - sub2api-network
    
    healthcheck:
      test:
        ["CMD","wget","-q","-T","5","-O","/dev/null","http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    
    # ★★★ 核心：Swarm 滚动升级策略 ★★★
    deploy:
      replicas: 2                  # 至少 2 个副本，才有滚动升级空间
      update_config:
        parallelism: 1             # 一次只动 1 个 task
        delay: 10s                 # 两批之间停 10s
        order: start-first         # 关键！先起新 task 再停旧 task
        failure_action: rollback   # 新 task healthcheck 失败自动回滚
        monitor: 60s               # 起来后观察 60s 是否稳定
        max_failure_ratio: 0.0
      rollback_config:
        parallelism: 1
        order: stop-first
        delay: 5s
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 60s
      resources:
        limits:
          memory: 2G               # 防止单 task 内存爆炸 OOM 拖死宿主
        reservations:
          memory: 256M
      # 只在 manager 节点跑（单机就是本机）
      placement:
        constraints:
          - node.role == manager
  
  # ===========================================================================
  # PostgreSQL（单实例，不滚动升级 — 数据库本身要保证只有一个写入者）
  # ===========================================================================
  postgres:
    image: postgres:18-alpine
    ulimits:
      nofile: { soft: 100000, hard: 100000 }
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - PGDATA=/var/lib/postgresql/data
      - POSTGRES_USER=${POSTGRES_USER:-sub2api}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-sub2api}
      - TZ=${TZ:-Asia/Shanghai}
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER:-sub2api} -d ${POSTGRES_DB:-sub2api}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      replicas: 1                  # 数据库保持单实例
      update_config:
        order: stop-first          # 数据库升级必须先停后起，不能并存
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 1G
  
  # ===========================================================================
  # Redis（单实例，同 postgres）
  # ===========================================================================
  redis:
    image: redis:8-alpine
    ulimits:
      nofile: { soft: 100000, hard: 100000 }
    volumes:
      - redis_data:/data
    command: >
      sh -c '
        redis-server
        --save 60 1
        --appendonly yes
        --appendfsync everysec
        ${REDIS_PASSWORD:+--requirepass "$REDIS_PASSWORD"}'
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - REDISCLI_AUTH=${REDIS_PASSWORD:-}
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      replicas: 1
      update_config:
        order: stop-first
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 512M

# =============================================================================
# Volumes（命名卷自动持久化在宿主机 /var/lib/docker/volumes/）
# =============================================================================
volumes:
  sub2api_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local

# =============================================================================
# Networks（Swarm overlay 网络，跨节点也能用）
# =============================================================================
networks:
  sub2api-network:
    driver: overlay
    attachable: true
